name: Feature request
description: Suggest an idea or product improvement for Moments
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement for Moments.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the gap, frustration, or missed use case.
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want to see.
      placeholder: Add an option to...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative ideas you have considered.
      placeholder: I also considered...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, references, or extra notes that help explain the request.
