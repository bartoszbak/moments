name: Moments
options:
  bundleIdPrefix: com.tillappcounter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

packages:
  BlurUIKit:
    url: https://github.com/TimOliver/BlurUIKit.git
    from: 1.1.0

targets:
  Moments:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Moments/SharedConfig.xcconfig
      Release: Moments/SharedConfig.xcconfig
    sources:
      - path: Moments
        excludes:
          - "**/.DS_Store"
          - "Config.xcconfig"
          - "Config.xcconfig.example"
          - "SharedConfig.xcconfig"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tillappcounter.Moments
        INFOPLIST_FILE: Moments/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Moments/Moments.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tillappcounter.Moments
    dependencies:
      - package: BlurUIKit
        product: BlurSwiftUI
      - target: MomentsWidgetExtension
        embed: true
    info:
      path: Moments/Info.plist
      properties:
        CFBundleName: Moments
        CFBundleDisplayName: Moments
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "Choose a background photo for your countdown."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MomentsWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MomentsWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tillappcounter.Moments.widget
        INFOPLIST_FILE: MomentsWidgetExtension/Info.plist
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: MomentsWidgetExtension/Moments.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tillappcounter.Moments
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: MomentsWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Moments Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
