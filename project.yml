name: TillApp
options:
  bundleIdPrefix: com.tillapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

targets:
  TillApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TillApp
        excludes:
          - "**/.DS_Store"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tillapp.TillApp
        INFOPLIST_FILE: TillApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: TillApp/TillApp.entitlements
    dependencies:
      - target: TillAppWidgetExtension
        embed: true
    info:
      path: TillApp/Info.plist
      properties:
        CFBundleName: TillApp
        CFBundleDisplayName: TillApp
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSPhotoLibraryUsageDescription: "Choose a background photo for your countdown."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  TillAppWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TillAppWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tillapp.TillApp.widget
        INFOPLIST_FILE: TillAppWidgetExtension/Info.plist
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: TillAppWidgetExtension/TillAppWidgetExtension.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: TillAppWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: TillApp Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
